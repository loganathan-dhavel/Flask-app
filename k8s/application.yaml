apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flask-pg-backend-application
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://gitlab.com/loganathan-dhavel/flask-pg-backend-argocd.git
    targetRevision: HEAD
    path: k8s/base
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    syncOptions:
      - CreateNamespace=true

    automated:
      selfHeal: true
      prune: true

